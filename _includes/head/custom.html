{% include base_path %}

<!-- start custom head snippets -->

<!-- Modern font: Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-96x96.png" sizes="96x96"/>
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon.png"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/web-app-manifest-192x192.png" sizes="192x192"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/web-app-manifest-512x512.png" sizes="512x512"/>
<link rel="manifest" href="{{ base_path }}/images/site.webmanifest"/>
<link rel="shortcut icon" href="{{ base_path }}/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Sidebar author profile revamp -->
<style>
/* ============================================================
   AVATAR — accent ring + glow
   ============================================================ */
.author__avatar img {
  border: 2px solid var(--global-link-color, #0284c7) !important;
  box-shadow: 0 0 0 4px rgba(2,132,199,0.12);
  padding: 3px !important;
  transition: box-shadow 0.3s ease;
}
.author__avatar img:hover {
  box-shadow: 0 0 0 6px rgba(2,132,199,0.2);
}

/* ============================================================
   NAME ROW — name + pronouns inline
   ============================================================ */
.author__name-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.45rem;
  margin-top: 10px;
  margin-bottom: 0.45rem;
}
.sidebar .author__name {
  font-size: 1.05em !important;
  font-weight: 800 !important;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin: 0 !important;
}

/* ============================================================
   PRONOUNS — inline pill beside name
   ============================================================ */
.author__pronouns {
  display: inline-block !important;
  font-size: 0.68em !important;
  color: var(--global-muted-color, #6b7280) !important;
  background: var(--global-card-bg-color, #f1f5f9);
  border: 1px solid var(--global-border-color, #e5e7eb);
  border-radius: 20px;
  padding: 0.13em 0.65em !important;
  margin: 0 !important;
  font-weight: 500;
  letter-spacing: 0.02em;
  vertical-align: middle;
  line-height: 1.6;
}

/* ============================================================
   BIO — bold, compact, separator below
   ============================================================ */
.author__bio {
  font-size: 0.82em !important;
  line-height: 1.55 !important;
  font-weight: 600 !important;
  color: var(--global-text-color, #374151) !important;
  margin-top: 0 !important;
  margin-bottom: 0 !important;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid var(--global-border-color, #e5e7eb);
}
.author__bio strong {
  color: var(--global-link-color, #0284c7);
  font-weight: 800;
}

/* ============================================================
   URLS / SOCIAL LINKS — all items unified size + hover effect
   ============================================================ */
.author__urls-wrapper .author__urls.social-icons {
  margin-top: 0.4rem;
}
.author__urls.social-icons li {
  line-height: 1 !important;
  margin-bottom: 0 !important;
}

/* Links (clickable items) */
.author__urls.social-icons li a {
  font-size: 0.92em !important;
  font-weight: 600 !important;
  padding: 0.3em 0.4em !important;
  margin-bottom: 0 !important;
  border-radius: 6px;
  display: flex !important;
  align-items: center;
  transition: background 0.15s, color 0.15s, padding-left 0.18s;
  color: var(--global-text-color, #374151);
  text-decoration: none !important;
  white-space: nowrap;
}
.author__urls.social-icons li a:hover {
  background: var(--global-card-bg-color, #f0f9ff);
  color: var(--global-link-color, #0284c7) !important;
  text-decoration: none !important;
  padding-left: 0.75em !important;
}

/* Location & employer — minimalist chips */
.author__urls.social-icons li.author__desktop {
  font-size: 0.78em !important;
  font-weight: 600 !important;
  color: var(--global-muted-color, #6b7280) !important;
  background: var(--global-card-bg-color, #f8fafc);
  border: 1px solid var(--global-border-color, #e5e7eb);
  border-radius: 20px;
  padding: 0.3em 0.75em 0.3em 0.5em !important;
  margin-bottom: 0.35rem !important;
  display: inline-flex !important;
  align-items: center;
  width: fit-content;
  white-space: nowrap;
}
.author__urls.social-icons li.author__desktop .icon-pad-right {
  color: var(--global-link-color, #0284c7);
  opacity: 1;
}

.author__urls.social-icons .icon-pad-right {
  margin-right: 0.5em !important;
  width: 1.1em;
  text-align: center;
  flex-shrink: 0;
  opacity: 0.55;
  font-size: 0.95em;
}
.author__urls.social-icons li a:hover .icon-pad-right {
  opacity: 1;
  color: var(--global-link-color, #0284c7);
}

/* ============================================================
   DARK MODE
   ============================================================ */
html[data-theme="dark"] .author__pronouns {
  background: rgba(255,255,255,0.06);
  border-color: var(--global-border-color, #374151);
}
html[data-theme="dark"] .author__urls.social-icons li a:hover {
  background: rgba(255,255,255,0.07);
}
</style>

<!-- end custom head snippets -->
