<script type="module" src="{{ base_path }}/assets/js/main.min.js?v={{ site.time | date: '%s' }}"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll("a[href]").forEach(function (link) {
      var href = link.getAttribute("href");
      if (!href || href.startsWith("#") || href.startsWith("javascript:")) return;
      var isSameDomain = link.hostname && link.hostname === window.location.hostname;
      if (isSameDomain) return;
      var isExternal = href.startsWith("http://") || href.startsWith("https://") || href.startsWith("//") || href.startsWith("mailto:");
      if (isExternal && !link.hasAttribute("target")) {
        link.setAttribute("target", "_blank");
        link.setAttribute("rel", "noopener noreferrer");
      }
    });
  });
</script>
